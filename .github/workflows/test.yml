name: Test

defaults:
  run:
    shell: bash

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      checks: write
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv sync --group test
    - name: Write prepare config
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          config_dir="$HOME/.config/prepare"
        elif [ "$RUNNER_OS" == "macOS" ]; then
          config_dir="$HOME/Library/Application Support/prepare"
        elif [ "$RUNNER_OS" == "Windows" ]; then
          config_dir="$APPDATA/prepare"
        fi
        mkdir -p "$config_dir"
        printf 'core:\n  git-mode: "https"\n' > "$config_dir/config.yml"
    - name: Run tests
      run: uv run pytest --cov --cov-report=xml --junitxml=tests.xml
    - name: Test Report
      uses: mikepenz/action-junit-report@v6
      if: success() || failure()
      with:
        check_name: Test Results (Python version ${{ matrix.python-version }})
        report_paths: tests.xml

  typecheck:
    strategy:
      matrix:
        python-version: [ "3.12" ]
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --group test
      - name: Type checker
        run: uv run mypy prepare_assignment
